<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tqdmoon WebAssembly Demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: #0d1117;
      color: #c9d1d9;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
      line-height: 1.6;
    }
    h1 { color: #58a6ff; }
    #output {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1rem;
      min-height: 120px;
      white-space: pre-wrap;
      overflow-x: auto;
    }
    .status { color: #8b949e; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>tqdmoon WebAssembly Demo</h1>
  <p>This page runs the MoonBit-compiled <code>tqdmoon.wasm</code> directly in your browser.</p>
  <div id="output">Loading WebAssembly module...</div>
  <div class="status" id="status"></div>
  <script src="main.js"></script>
</body>
</html>
