name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
        working-directory: tqdmoon
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2 + MinGW (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc

      - name: Setup MoonBit toolchain
        uses: hustcer/setup-moonbit@v1
        with:
          version: latest

      - name: Update MoonBit dependencies
        run: moon update

      - name: Build native binary
        run: moon build --target native --release

      - name: Build Wasm bytecode
        run: moon build --target wasm --release

      - name: Package all-in-one distribution
        run: |
          mkdir -p dist/bin dist/lib
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp _build/native/release/build/cmd/main/main.exe dist/bin/tqdmoon.exe
          else
            cp _build/native/release/build/cmd/main/main dist/bin/tqdmoon
          fi
          cp _build/wasm/release/build/cmd/wasm/wasm.wasm dist/lib/tqdmoon.wasm
          cp ../README.md dist/
          tar -czf tqdmoon-${{ matrix.os }}.tar.gz dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: tqdmoon/tqdmoon-${{ matrix.os }}.tar.gz
