name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test-and-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tqdmoon
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MoonBit toolchain
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Verify MoonBit installation
        run: moon version --all

      - name: Update MoonBit dependencies
        run: moon update

      - name: Check formatting
        run: |
          moon fmt
          git diff --exit-code

      - name: Update interface lock
        run: moon info

      - name: Check interface lock is up to date
        run: git diff --exit-code

      - name: Run tests
        run: moon test

      - name: Extract latest changelog section
        id: changelog
        run: |
          awk '/^## \[/{if (found) exit; found=1} found' ../CHANGELOG.md > /tmp/release-notes.md
          cat /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
