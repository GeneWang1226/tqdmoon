name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
        working-directory: tqdmoon
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup MoonBit toolchain
        uses: hustcer/setup-moonbit@v1
        with:
          version: latest

      - name: Update MoonBit dependencies
        run: moon update

      - name: Build native binary
        run: moon build --target native --release

      - name: Build Wasm bytecode
        run: moon build --target wasm --release

      - name: Inspect build outputs
        run: |
          echo "--- native build tree ---"
          find _build/native/release/build -type f || true
          echo "--- wasm build tree ---"
          find _build/wasm/release/build -type f || true

      - name: Package all-in-one distribution
        run: |
          mkdir -p dist/bin dist/lib
          NATIVE_BIN=$(find _build/native/release/build -type f \( -name 'main' -o -name 'main.exe' -o -name 'tqdmoon' -o -name 'tqdmoon.exe' \) | head -n 1)
          if [ -z "$NATIVE_BIN" ]; then
            echo "native binary not found"
            exit 1
          fi
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "$NATIVE_BIN" dist/bin/tqdmoon.exe
          else
            cp "$NATIVE_BIN" dist/bin/tqdmoon
          fi
          cp _build/wasm/release/build/cmd/wasm/wasm.wasm dist/lib/tqdmoon.wasm
          cp ../README.md dist/
          tar -czf tqdmoon-${{ matrix.os }}.tar.gz dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: tqdmoon/tqdmoon-${{ matrix.os }}.tar.gz
